name: Twisty! StoryVault — render & upload

on:
  schedule:
    # Times below are UTC; posting schedule is 8:30am / 12:30pm / 4:45pm / 8:30pm IST (UTC+5:30)
    - cron: "0 3 * * *"    # 08:30 IST
    - cron: "0 7 * * *"    # 12:30 IST
    - cron: "15 11 * * *"  # 16:45 IST
    - cron: "0 15 * * *"   # 20:30 IST
  workflow_dispatch: {}

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render + upload next queued story
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
          GOOGLE_TOKEN_PICKLE_B64: ${{ secrets.GOOGLE_TOKEN_PICKLE_B64 }}
          YOUTUBE_PRIVACY: "private"
          YOUTUBE_CATEGORY_ID: "24"
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          PAUSE_INSTAGRAM: "true"  # Instagram has no private/draft option — paused while debugging the audio bug
        run: python render_from_supabase.py
